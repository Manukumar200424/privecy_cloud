<!DOCTYPE html>
<html>
<body style="margin:0; background:#2F1893; color:#fff; font-family:sans-serif; text-align:center; display:flex; flex-direction:column; min-height:100vh">

    <!-- Navigation Bar -->
    <nav style="display:flex; justify-content:space-between; padding:40px 80px; align-items:center">
        <b>Startup 3</b>
        <div style="display:flex; gap:30px; align-items:center">
            <a href="#" style="color:#fff; text-decoration:none; opacity:0.7">Subscribe</a>
            <a href="#" style="color:#fff; text-decoration:none; opacity:0.7">Features</a>
            <a href="#" style="background:#482BE7; color:#fff; text-decoration:none; padding:10px 25px; border-radius:25px">Sign Up</a>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:20px">
        <h1 style="font-size:50px; margin:0">Let's make design<br>fast and easy</h1>
        <p style="max-width:500px; opacity:0.7; margin:25px 0 40px; line-height:1.6">
            The most important part of the Startup is the samples. The samples form a set of 25 usable pages.
        </p>
        
        <!-- Subscription Form -->
        <form id="f" style="display:flex; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:30px; width:450px; padding:5px">
            <input type="email" placeholder="Your email" required style="background:none; border:none; padding:15px; color:#fff; flex:1; outline:none">
            <button style="background:#25E2BD; border:none; padding:0 30px; border-radius:25px; color:#fff; font-weight:bold; cursor:pointer">
                Send
            </button>
        </form>
        
        <small style="margin-top:20px; opacity:0.4">
            By signing up, you agree to the Terms of Service
        </small>
    </main>

    <!-- Form Logic -->
    <script>
        document.getElementById('f').onsubmit = (e) => { 
            e.preventDefault(); 
            alert("Sent!"); 
        };
    </script>

</body>
</html>
