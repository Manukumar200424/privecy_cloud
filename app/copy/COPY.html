<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Startup 3 - Side-by-Side Lab</title>
    <style>
        /* 1. RESET: Clears default browser spacing */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #2F1893; /* Dark Purple */
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 2. NAVIGATION: Logo left, Links right */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 80px;
        }

        .logo { font-weight: bold; font-size: 24px; }
        .nav-links a { color: white; text-decoration: none; margin-left: 20px; }
        .signup-btn { background: #482BE7; padding: 10px 20px; border-radius: 20px; }

        /* 3. HERO: THE SPLIT LAYOUT */
        .hero {
            flex: 1;
            display: flex;           /* Turns on Flexbox */
            flex-direction: row;     /* Side-by-side layout */
            align-items: center;     /* Centers items vertically */
            justify-content: center; /* Centers items horizontally */
            padding: 0 80px;
            gap: 50px;               /* Space between image and text */
        }

        /* Image Column (Left) */
        .hero-left {
            flex: 1;                 /* Takes up 50% width */
            display: flex;
            justify-content: center;
        }

        .hero-left img {
            width: 100%;
            max-width: 450px;        /* Limits image size */
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Text Column (Right) */
        .hero-right {
            flex: 1;                 /* Takes up 50% width */
            text-align: left;        /* Aligns text to the left */
        }

        h1 {
            font-size: 50px;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        p {
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* 4. FORM: The "Glass" effect from your image */
        .input-group {
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px;
            border-radius: 40px;
            max-width: 450px;
        }

        input {
            background: transparent;
            border: none;
            padding: 10px 20px;
            color: white;
            outline: none;
            flex: 1;
        }

        button {
            background-color: #25DAC5; /* Turquoise */
            color: #1E0E62;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover { background-color: #1eb9a7; }

    </style>
</head>
<body>

    <nav>
        <div class="logo">Startup 3</div>
        <div class="nav-links">
            <a href="#">Features</a>
            <a href="#" class="signup-btn">Sign Up</a>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-left">
            <img src="https://picsum.photos/600/400" alt="Design Preview">
        </div>

        <div class="hero-right">
            <h1>Let's make design<br>fast and easy</h1>
            <p>The samples form a set of 25 usable pages you can use as is or you can add new blocks from UI Kit.</p>

            <div class="input-group">
                <input type="email" id="userEmail" placeholder="Your email">
                <button onclick="handleSend()">Send</button>
            </div>
        </div>
    </div>

    <script>
        function handleSend() {
            let email = document.getElementById('userEmail').value;
            if(email === "") {
                alert("Please enter an email!");
            } else {
                alert("Success! " + email + " added.");
            }
        }
    </script>

</body>
</html>
